name: CB listing strong alert

on:
  schedule:
    # 17:00 Asia/Taipei = 09:00 UTC
    - cron: "0 9 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Target listing date, YYYY-MM-DD. Leave blank for today in Asia/Taipei."
        required: false
        default: ""
      send_no_match:
        description: "Send LINE even when there is no match."
        required: false
        default: "false"

jobs:
  alert:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FINLAB_API_TOKEN: ${{ secrets.FINLAB_API_TOKEN }}
      LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
      LINE_TO_ID: ${{ secrets.LINE_TO_ID }}
      LINE_SEND_NO_MATCH: ${{ github.event.inputs.send_no_match || 'false' }}
      TARGET_DATE: ${{ github.event.inputs.date || '' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run CB LINE alert
        run: |
          if [ -n "$TARGET_DATE" ]; then
            python cb_line_alert.py --date "$TARGET_DATE"
          else
            python cb_line_alert.py
          fi

